<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Invoice + Stripe Automation - MAEW</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>body{background:#070A12;color:#E8E2D6;font-family:Inter}.gold{color:#D4AF37}</style></head>
<body class="p-8 max-w-6xl mx-auto">
<div class="flex justify-between items-center mb-8">
<h1 class="text-3xl font-bold">Invoice Automation <span class="gold">+ Stripe</span></h1>
<div class="text-sm text-white/50">MRR Live • Auto Billing • Evidence 100%</div>
</div>
<div class="grid md:grid-cols-2 gap-6">
<div class="rounded-2xl bg-[#0F1320] border border-white/10 p-6">
<h3 class="gold font-bold mb-4">Create Invoice</h3>
<input id="company" placeholder="Company Name" class="w-full mb-2 px-4 py-2 rounded-xl bg-black border border-white/10">
<input id="email" placeholder="billing@company.com" class="w-full mb-3 px-4 py-2 rounded-xl bg-black border border-white/10">
<div id="caps" class="space-y-2 mb-4"></div>
<div class="flex gap-2 mb-4">
<input id="coupon" placeholder="Coupon GOLD20" class="flex-1 px-3 py-2 rounded-xl bg-black border border-white/10 text-sm">
<button onclick="applyCoupon()" class="px-4 py-2 rounded-full bg-white/10 text-sm">Apply</button>
</div>
<div class="flex justify-between text-sm mb-1"><span>Subtotal/mo</span><span id="sub">$0</span></div>
<div class="flex justify-between text-sm text-green-400 mb-1"><span>Discount</span><span id="disc">-$0</span></div>
<div class="flex justify-between font-bold text-lg"><span>Total/mo</span><span id="tot" class="gold">$0</span></div>
<button onclick="genInvoice()" class="w-full mt-4 py-3 rounded-full bg-[#D4AF37] text-black font-bold">Generate Invoice + Stripe Link</button>
</div>
<div class="space-y-6">
<div class="rounded-2xl bg-[#0F1320] border border-[#D4AF37]/30 p-6">
<h3 class="gold font-bold mb-3">Stripe Checkout Mock</h3>
<div id="stripeBox" class="rounded-xl bg-white text-black p-5 text-sm">
<div class="text-center text-black/40 py-10">Generate invoice first to create Stripe link</div>
</div>
<button id="payBtn" onclick="pay()" class="hidden w-full mt-3 py-3 rounded-full bg-[#635BFF] text-white font-bold">Pay with Stripe • Test Mode</button>
</div>
<div class="rounded-2xl bg-[#0F1320] border border-white/10 p-6">
<h3 class="font-bold mb-3">Automation Log</h3>
<div id="log" class="text-[12px] font-mono text-white/60 space-y-1 h-32 overflow-auto"></div>
</div>
</div>
</div>
<script>
const packs=[{id:'Ω116',n:'AI Finance Officer',p:2499},{id:'Ω121',n:'Healthcare Pack',p:3999},{id:'Ω131',n:'Self-Healing Infra',p:999},{id:'Ω141',n:'Sovereign LLM Gateway',p:1499}];
let sel={};let coupon=0;
function renderCaps(){document.getElementById('caps').innerHTML=packs.map(c=>`<label class="flex justify-between items-center p-2 rounded-xl bg-black/50 border border-white/5 cursor-pointer"><span class="flex gap-2 items-center"><input type="checkbox" onchange="toggle('${c.id}')" ${sel[c.id]?'checked':''}> <span class="text-sm">${c.id} ${c.n}</span></span><span class="text-sm gold">$${c.p}</span></label>`).join('');}
function toggle(id){sel[id]=!sel[id];calc();}
function calc(){let sub=Object.keys(sel).filter(k=>sel[k]).reduce((s,k)=>s+packs.find(p=>p.id===k).p,0);let disc=Math.round(sub*coupon);document.getElementById('sub').innerText='$'+sub;document.getElementById('disc').innerText='-$'+disc;document.getElementById('tot').innerText='$'+(sub-disc);}
function log(m){let d=document.getElementById('log');d.innerHTML+=`<div>[${new Date().toLocaleTimeString()}] ${m}</div>`;d.scrollTop=d.scrollHeight;}
function applyCoupon(){let v=document.getElementById('coupon').value;if(v==='GOLD20'){coupon=0.2;log('Coupon GOLD20 applied -20%');}else if(v==='LAUNCH50'){coupon=0.5;log('Coupon LAUNCH50 applied -50%');}else{coupon=0;log('Invalid coupon');}calc();}
function genInvoice(){
let items=Object.keys(sel).filter(k=>sel[k]);if(!items.length)return alert('Select packs');
let comp=document.getElementById('company').value||'Acme Corp';
let total=document.getElementById('tot').innerText;
let inv='INV-Ω∞-'+Math.random().toString(36).slice(2,7).toUpperCase();
log(`Invoice ${inv} created for ${comp} total ${total}/mo`);
log(`Evidence 100% anchored - hash ${Math.random().toString(16).slice(2,10)}`);
let stripe='https://checkout.stripe.com/c/pay/'+inv.toLowerCase()+'_test_'+Math.random().toString(36).slice(2);
document.getElementById('stripeBox').innerHTML=`<div class="font-bold">Order ${inv}</div><div class="text-black/60 text-xs mt-1">${comp}</div><div class="mt-3 space-y-1">${items.map(id=>{let p=packs.find(x=>x.id===id);return `<div class="flex justify-between"><span>${p.id} ${p.n}</span><span>$${p.p}</span></div>`}).join('')}</div><div class="border-t mt-3 pt-3 flex justify-between font-bold"><span>Total/mo</span><span>${total}</span></div><div class="mt-3 text-[11px] text-black/50">Stripe Payment Link:<br><a href="#" class="text-[#635BFF] break-all">${stripe}</a></div>`;
document.getElementById('payBtn').classList.remove('hidden');
document.getElementById('payBtn').dataset.link=stripe;
log(`Stripe link generated: ${stripe}`);
}
function pay(){
let link=document.getElementById('payBtn').dataset.link;
log('Redirecting to Stripe Checkout...');
log('Payment intent pi_... created - test card 4242 4242 4242 4242');
setTimeout(()=>{log('Payment succeeded - $'+document.getElementById('tot').innerText+' charged');log('Invoice marked PAID - sending Gold Certificate...');alert('✅ Payment Success (Test Mode)\\n\\nInvoice PAID\\nGold Certificate generated\\nEvidence anchored to blockchain\\n\\nCheck Automation Log for details');window.open('Gold-Certificate-PDF.html','_blank');},1200);
}
renderCaps();log('System ready - Core Impact NONE');log('Waiting for invoice creation...');
</script>
</body></html>
